name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - ".github/workflows/**"
      - "pyproject.toml"
      - "src/skills_router/**"
      - "tests/**"
      - "examples/**"
      - "skills-router-npx/**"
      - "README.md"
      - "CHANGELOG.md"
      - "GUIDELINE.md"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "pyproject.toml"
      - "src/skills_router/**"
      - "tests/**"
      - "examples/**"
      - "skills-router-npx/**"
      - "README.md"
      - "CHANGELOG.md"
      - "GUIDELINE.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: pytest -q

      - name: Smoke test Python CLI
        run: |
          python -m skills_router.cli --help
          skills-router --help
          skills-router --data-dir .tmp-ci prompt --target codex

  node-wrapper:
    name: Node wrapper
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Smoke test local npx wrapper
        run: |
          node skills-router-npx/bin/cli.js --help
          node skills-router-npx/bin/cli.js --data-dir .tmp-ci-node chat "/skills-router refine" --target codex --agent-id ci-agent --parse-only --json

      - name: Validate npm package shape
        working-directory: skills-router-npx
        run: npm pack --dry-run

  package:
    name: Package build
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  pypi-publish:
    name: Publish PyPI package
    runs-on: ubuntu-latest
    needs:
      - python
      - package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.event.created == true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish Python distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  npm-publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs:
      - pypi-publish
      - node-wrapper
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.event.created == true

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@the-long-ride"

      - name: Install Python runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Read npm package metadata
        id: npm-package
        working-directory: skills-router-npx
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const packageJson = require("./package.json");
          console.log(`name=${packageJson.name}`);
          console.log(`version=${packageJson.version}`);
          NODE

      - name: Check npm version
        id: npm-publish-check
        working-directory: skills-router-npx
        run: |
          package_name="${{ steps.npm-package.outputs.name }}"
          package_version="${{ steps.npm-package.outputs.version }}"
          if npm view "${package_name}@${package_version}" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "${package_name}@${package_version} already exists on npm; skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "${package_name}@${package_version} is not on npm; publishing."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify npm token
        if: steps.npm-publish-check.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN repository secret is required to publish."
            exit 1
          fi
          npm whoami --registry=https://registry.npmjs.org/

      - name: Publish npm package
        if: steps.npm-publish-check.outputs.should_publish == 'true'
        working-directory: skills-router-npx
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs:
      - pypi-publish
      - npm-publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.event.created == true
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build release description
        env:
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python <<'PY'
          import os
          from pathlib import Path

          tag = os.environ["TAG_NAME"]
          version = tag[1:] if tag.startswith("v") else tag
          repository = os.environ["REPOSITORY"]
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")

          heading = f"## [{version}]"
          start = changelog.find(heading)
          if start == -1:
              release_body = f"## {tag}\n\nNo changelog entry found for {version}."
          else:
              next_start = changelog.find("\n## [", start + len(heading))
              if next_start == -1:
                  next_start = len(changelog)
              release_body = changelog[start:next_start].strip()

          links = "\n".join([
              "## Links",
              f"- Changelog: https://github.com/{repository}/blob/{tag}/CHANGELOG.md",
              "- PyPI package: https://pypi.org/project/skills-router/",
              "- npm package: https://www.npmjs.com/package/@the-long-ride/skills-router",
          ])
          Path("release-notes.md").write_text(
              f"{release_body}\n\n{links}\n",
              encoding="utf-8",
          )
          PY

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$TAG_NAME" --notes-file release-notes.md
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes-file release-notes.md
          fi
